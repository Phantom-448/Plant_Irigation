<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-C3 Bewässerung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-success shadow-sm mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🌱 Garten Dashboard</span>
            <span class="navbar-text text-white fw-bold" id="clock">00:00:00</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3">

            <!-- ... Hier bleiben die alten Karten (Klima, Bodenfeuchte, Timer) aus dem vorherigen Code ... -->

            <!-- NEU: Einstellungen mit Schiebereglern -->
            <div class="col-12 col-md-6">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-3 text-muted">⚙️ Einstellungen</h6>
                        
                        <!-- Regler 1: Dauer -->
                        <div class="mb-4">
                            <label for="durationSlider" class="form-label d-flex justify-content-between">
                                <span>Bewässerungsdauer:</span>
                                <span id="durationVal" class="fw-bold text-primary">15 min</span>
                            </label>
                            <input type="range" class="form-range" min="1" max="60" value="15" id="durationSlider" oninput="updateLabel('durationSlider', 'durationVal', 'min')">
                        </div>

                        <!-- Regler 2: Pumpenleistung (PWM) -->
                        <div class="mb-4">
                            <label for="flowSlider" class="form-label d-flex justify-content-between">
                                <span>Pumpenleistung:</span>
                                <span id="flowVal" class="fw-bold text-info">80 %</span>
                            </label>
                            <input type="range" class="form-range" min="0" max="100" step="5" value="80" id="flowSlider" oninput="updateLabel('flowSlider', 'flowVal', '%')">
                        </div>

                        <button class="btn btn-outline-success w-100 py-2 shadow-sm" onclick="saveSettings()">
                            💾 Einstellungen an ESP senden
                        </button>
                    </div>
                </div>
            </div>

            <!-- Manuelle Steuerung -->
            <div class="col-12 col-md-6">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <button id="btn-water" class="btn btn-primary btn-lg w-100 py-3 shadow-sm" onclick="manualWatering()">
                            💧 Jetzt Bewässern
                        </button>
                        <p class="text-center text-muted mt-3 mb-0" id="pump-status">Pumpe ist AUS</p>
                    </div>
                </div>
            </div>

        </div> 
    </div> 

    <script>
        // Uhrzeit (wie bisher)
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
        }, 1000);

        // NEU: Funktion, die den Text neben dem Regler sofort beim Schieben aktualisiert
        function updateLabel(sliderId, labelId, unit) {
            const val = document.getElementById(sliderId).value;
            document.getElementById(labelId).innerText = val + " " + unit;
        }

        // NEU: Einstellungen sammeln und als JSON an den ESP senden
        async function saveSettings() {
            const duration = parseInt(document.getElementById('durationSlider').value);
            const flow = parseInt(document.getElementById('flowSlider').value);

            const payload = {
                watering_duration_min: duration,
                pump_pwm_percent: flow
            };

            console.log("Sende folgende Einstellungen an den ESP32:", payload);
            alert("Einstellungen gespeichert!\nDauer: " + duration + " min\nLeistung: " + flow + " %");

            /* Später im C-Code aktivieren:
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            */
        }

        // ... (hier kommt die fetchStatus() und updateDashboard() Funktion von vorhin rein) ...
    </script>
</body>
</html>
