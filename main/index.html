<div class="card shadow-sm border-0">
    <div class="card-body">
        <h5 class="card-title mb-4">Zeitgesteuerte Bewässerung</h5>
        
        <div class="mb-4">
            <label for="durationSlider" class="form-label d-flex justify-content-between">
                <span>Dauer:</span>
                <span id="durationVal" class="fw-bold text-primary">5 min</span>
            </label>
            <input type="range" class="form-range" min="1" max="60" value="5" id="durationSlider" 
                   oninput="document.getElementById('durationVal').innerText = this.value + ' min'">
        </div>

        <button class="btn btn-success w-100 py-3 shadow" onclick="startWatering()">
            🚿 Bewässerung starten
        </button>
    </div>
</div>

<script>
async function startWatering() {
    const minutes = document.getElementById('durationSlider').value;
    
    const payload = { "duration_min": parseInt(minutes) };

    await fetch('/api/start_watering', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    alert("Bewässerung für " + minutes + " Minuten gestartet!");
}
</script>
