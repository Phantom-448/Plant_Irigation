<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartIrrigation C3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #f8f9fa; }
        .gauge-container { width: 100%; height: 200px; }
        .countdown-text { font-size: 3rem; font-family: monospace; font-weight: bold; color: #0d6efd; letter-spacing: 2px;}
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .navbar-custom { background-color: #198754; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-custom shadow-sm mb-4 py-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-seedling me-2"></i>Smart Balkon</span>
            <span class="navbar-text text-white fw-bold" id="clock">00:00</span>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4 mb-4">
            <div class="col-12 col-md-4">
                <div class="card h-100 text-center">
                    <div class="card-body">
                        <h6 class="text-muted text-uppercase fw-bold"><i class="fa-solid fa-temperature-half text-danger"></i> Temperatur</h6>
                        <div id="tempGauge" class="gauge-container"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card h-100 text-center">
                    <div class="card-body">
                        <h6 class="text-muted text-uppercase fw-bold"><i class="fa-solid fa-droplet text-info"></i> Luftfeuchte</h6>
                        <div id="humidGauge" class="gauge-container"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card h-100 text-center">
                    <div class="card-body">
                        <h6 class="text-muted text-uppercase fw-bold"><i class="fa-solid fa-faucet-drip text-success"></i> Bodenfeuchte</h6>
                        <div id="soilGauge" class="gauge-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-12">
                <div class="card text-center">
                    <div class="card-body py-4">
                        <h6 class="text-muted text-uppercase fw-bold mb-3"><i class="fa-regular fa-clock"></i> Nächste Bewässerung in</h6>
                        <div class="countdown-text" id="countdown-timer">--:--:--</div>
                        <p class="text-muted small mt-2 mb-0">Automatischer Zyklus</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-12 col-md-6">
                <div class="card h-100">
                    <div class="card-body">
                        <h6 class="card-title text-muted fw-bold mb-4"><i class="fa-solid fa-sliders"></i> Zeit-Bewässerung</h6>
                        
                        <div class="mb-4">
                            <label for="durationSlider" class="form-label d-flex justify-content-between">
                                <span>Dauer wählen:</span>
                                <span id="durationVal" class="fw-bold text-success">5 min</span>
                            </label>
                            <input type="range" class="form-range" min="1" max="60" value="5" id="durationSlider" 
                                   oninput="document.getElementById('durationVal').innerText = this.value + ' min'">
                        </div>

                        <button class="btn btn-outline-success w-100 py-3 fw-bold" onclick="startTimedWatering()">
                            <i class="fa-solid fa-play me-2"></i> Timer Starten
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6">
                <div class="card h-100">
                    <div class="card-body d-flex flex-column justify-content-center text-center">
                        <h6 class="card-title text-muted fw-bold mb-3">Direktsteuerung</h6>
                        <h3 id="pump-status-text" class="mb-4">Pumpe ist AUS</h3>
                        <button id="btn-toggle" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-sm" onclick="toggleRelay()">
                            <i class="fa-solid fa-power-off me-2"></i> Pumpe Umschalten
                        </button>
                    </div>
                </div>
            </div>
        </div> 

        <div class="row g-4 mb-4">
            <div class="col-12">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h6 class="card-title text-muted fw-bold mb-3"><i class="fa-solid fa-file-lines"></i> Bewässerungs-Profil</h6>
                        
                        <div class="input-group mt-3">
                            <select class="form-select" id="profileSelect">
                                <option selected disabled>Lade Profile...</option>
                            </select>
                            <button class="btn btn-primary fw-bold" onclick="activateSelectedProfile()">
                                Aktivieren
                            </button>
                        </div>
                        <div class="form-text mt-2" id="activeProfileText">Aktuell geladen: Unbekannt</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-muted d-flex justify-content-between align-items-center mb-3">
                            <span><i class="fa-solid fa-chart-line"></i> Historie</span>
                            <button class="btn btn-sm btn-outline-secondary" onclick="loadAndDrawChart()" title="Daten neu laden">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                        </h5>
                        
                        <div style="position: relative; height: 300px; width: 100%;">
                            <canvas id="logChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div> 

    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.4.0/justgage.min.js"></script>

    <script>
        // --- 1. Uhren & UI Setup ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // --- 2. Gauges Initialisieren ---
        let tGauge = new JustGage({
            id: "tempGauge",
            value: 0,
            min: -10,
            max: 50,
            title: "°C",
            labelFontColor: "#333",
            valueFontColor: "#dc3545",
            levelColors: ["#005088", "#11caa0", "#dc3545"],
            decimals: 1
        });

        let hGauge = new JustGage({
            id: "humidGauge",
            value: 0,
            min: 0,
            max: 100,
            title: "%",
            labelFontColor: "#333",
            valueFontColor: "#0dcaf0",
            levelColors: ["#dc3545", "#ffc107", "#0dcaf0"]
        });

        // NEU: Bodenfeuchtigkeits-Gauge hinzugefügt
        let sGauge = new JustGage({
            id: "soilGauge",
            value: 0,
            min: 0,
            max: 100,
            title: "%",
            labelFontColor: "#333",
            valueFontColor: "#198754",
            levelColors: ["#dc3545", "#ffc107", "#198754"] // Rot = Trocken, Grün = Feucht
        });

        // --- 3. Countdown Logik ---
        let targetWateringTime = Date.now();

        function updateCountdown() {
            let now = Date.now();
            let diff = targetWateringTime - now;

            if (diff <= 0) {
                document.getElementById('countdown-timer').innerText = "00:00:00";
                return;
            }

            let h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let s = Math.floor((diff % (1000 * 60)) / 1000);

            h = (h < 10) ? "0" + h : h;
            m = (m < 10) ? "0" + m : m;
            s = (s < 10) ? "0" + s : s;

            document.getElementById('countdown-timer').innerText = h + ":" + m + ":" + s;
        }
        setInterval(updateCountdown, 1000);

        // --- 4. Live-Daten (Status) vom ESP32 abrufen ---
        let currentPumpState = false;

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                tGauge.refresh(data.temperature);
                hGauge.refresh(data.air_humidity);
                sGauge.refresh(data.soil_moisture_1); // NEU: Aktualisiert das Bodenfeuchte-Gauge über das JSON-Feld

                let minutesRemaining = data.minutes_to_next_water;
                if(minutesRemaining > 0) {
                     let calculatedTarget = Date.now() + (minutesRemaining * 60000);
                     if(Math.abs(calculatedTarget - targetWateringTime) > 60000) {
                         targetWateringTime = calculatedTarget;
                     }
                } else {
                    targetWateringTime = Date.now();
                }

                updatePumpUI(data.pump_running);
            } catch (err) {
                console.error("ESP32 nicht erreichbar", err);
            }
        }
        setInterval(fetchStatus, 5000);
        setTimeout(fetchStatus, 500);

        // --- 5. Steuer-Befehle ---
        async function toggleRelay() {
            currentPumpState = !currentPumpState;
            updatePumpUI(currentPumpState);

            await fetch('/api/relay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state: currentPumpState })
            });
        }

        async function startTimedWatering() {
            const min = document.getElementById('durationSlider').value;
            await fetch('/api/start_watering', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duration_min: parseInt(min) })
            });
            alert("Timer gestartet: Bewässere für " + min + " Minuten.");
        }

        function updatePumpUI(state) {
            currentPumpState = state;
            const btn = document.getElementById('btn-toggle');
            const txt = document.getElementById('pump-status-text');

            if (state) {
                btn.innerHTML = "<i class='fa-solid fa-stop me-2'></i> Pumpe Stoppen";
                btn.classList.replace('btn-primary', 'btn-danger');
                txt.innerText = "AKTIV";
                txt.classList.add('text-danger');
            } else {
                btn.innerHTML = "<i class='fa-solid fa-power-off me-2'></i> Pumpe Einschalten";
                btn.classList.replace('btn-danger', 'btn-primary');
                txt.innerText = "AUS";
                txt.classList.remove('text-danger');
            }
        }

        // --- 6. Profil-Manager ---
        async function loadProfilesList() {
            try {
                const response = await fetch('/api/profiles');
                const profiles = await response.json();
                
                const select = document.getElementById('profileSelect');
                select.innerHTML = ''; 
                
                if(profiles.length === 0) {
                    select.innerHTML = '<option disabled>Keine Profile gefunden</option>';
                    return;
                }

                profiles.forEach(name => {
                    let opt = document.createElement('option');
                    opt.value = name;
                    opt.innerHTML = name.charAt(0).toUpperCase() + name.slice(1); 
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("Fehler beim Laden der Profil-Liste", err);
            }
        }

        async function activateSelectedProfile() {
            const select = document.getElementById('profileSelect');
            const selectedName = select.value;
            
            if(!selectedName) return;

            await fetch('/api/profile/activate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ profile_name: selectedName })
            });
            
            document.getElementById('activeProfileText').innerHTML = 
                `Aktuell geladen: <span class="text-success fw-bold">${selectedName}</span>`;
        }

        // --- 7. Histogramm (Chart.js) ---
        let logChartInstance = null;

        async function loadAndDrawChart() {
            try {
                const response = await fetch('/api/logs');
                if(!response.ok) return;
                
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== '');
                
                const labels = [];
                const tempValues = [];
                const moistValues = [];

                const recentLines = lines.slice(-50);

                recentLines.forEach(line => {
                    const cols = line.split(',');
                    if (cols.length >= 4) {
                        labels.push(cols[0].substring(11, 16));
                        tempValues.push(parseFloat(cols[1]));
                        moistValues.push(parseInt(cols[3]));
                    }
                });

                const ctx = document.getElementById('logChart').getContext('2d');
                
                if (logChartInstance) {
                    logChartInstance.destroy();
                }

                logChartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Temperatur (°C)',
                                data: tempValues,
                                borderColor: '#dc3545',
                                backgroundColor: 'rgba(220, 53, 69, 0.1)',
                                tension: 0.3,
                                yAxisID: 'y',
                                fill: true
                            },
                            {
                                label: 'Bodenfeuchte (%)',
                                data: moistValues,
                                borderColor: '#0dcaf0',
                                backgroundColor: 'rgba(13, 202, 240, 0.1)',
                                tension: 0.3,
                                yAxisID: 'y1',
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        scales: {
                            y: { type: 'linear', display: true, position: 'left' },
                            y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false } }
                        }
                    }
                });
            } catch (err) {
                console.error("Fehler beim Zeichnen des Charts:", err);
            }
        }

        // --- 8. Initialisierung beim Laden ---
        loadProfilesList();
        loadAndDrawChart();
        setInterval(loadAndDrawChart, 900000); 

    </script>
</body>
</html>
